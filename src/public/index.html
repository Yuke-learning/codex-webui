<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Codex WebUI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <button id="mobile-sidebar-backdrop" class="mobile-sidebar-backdrop hidden" type="button" aria-label="关闭对话列表"></button>
      <aside id="sidebar" class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">C</div>
          <div>
            <strong>Codex WebUI</strong>
            <span id="connection-status" class="connection-status">正在检查 Mac…</span>
            <a id="network-access" class="network-access hidden" target="_blank" rel="noopener noreferrer"></a>
          </div>
          <button id="open-settings" class="icon-button settings-button" type="button" title="设置" aria-label="设置" aria-pressed="false">&#9881;</button>
          <button id="close-mobile-sidebar" class="icon-button mobile-sidebar-close" type="button" title="关闭对话列表" aria-label="关闭对话列表">×</button>
        </div>
        <button id="provider-switch" class="provider-control sidebar-provider-control" type="button" disabled aria-label="切换全局服务商" title="正在检测 CC Switch">
          <span>全局服务商</span>
          <strong id="provider-switch-label">检测中…</strong>
        </button>
        <button id="new-thread" class="primary-button full-width">+ 新建对话</button>
        <label class="search-field" for="search">
          <span>⌕</span>
          <input id="search" type="search" placeholder="搜索对话" autocomplete="off" />
        </label>
        <div class="sidebar-content">
          <div class="thread-toolbar">
            <span id="thread-count">0 个对话</span>
            <button id="refresh-threads" class="icon-button" type="button" title="同步全部对话和当前任务" aria-label="同步全部对话和当前任务" aria-busy="false"><span aria-hidden="true">↻</span></button>
          </div>
          <nav id="thread-list" class="thread-list" aria-label="按项目分组的 Codex 对话列表"></nav>
        </div>
      </aside>

      <section class="workspace">
        <button id="open-mobile-sidebar" class="icon-button mobile-sidebar-toggle" type="button" title="打开对话列表" aria-label="打开对话列表" aria-controls="sidebar" aria-expanded="false">☰</button>
        <header id="thread-header" class="thread-header hidden">
          <div>
            <p id="thread-cwd" class="eyebrow"></p>
            <h1 id="thread-title"></h1>
          </div>
          <div class="header-controls">
            <div class="thread-settings" aria-label="当前线程设置">
              <label class="select-control">
                <span>模型</span>
                <select id="thread-model" aria-label="当前线程模型"></select>
              </label>
              <label class="select-control">
                <span>推理强度</span>
                <select id="thread-effort" aria-label="当前线程推理强度"></select>
              </label>
            </div>
            <div class="thread-actions">
              <button id="rename-thread" class="quiet-button">改名</button>
              <button id="archive-thread" class="quiet-button">归档</button>
              <button id="delete-thread" class="danger-button">删除</button>
            </div>
          </div>
        </header>

        <section id="empty-state" class="empty-state">
          <div class="empty-orb">⌘</div>
          <p class="eyebrow">远程控制台</p>
          <h1>在这里管理你的 Codex 对话</h1>
          <p>选择已有对话，或创建新线程。所有模型请求仍只在这台 Mac 上使用已有 Codex 配置执行。</p>
          <button id="empty-new-thread" class="primary-button">开始新对话</button>
        </section>

        <section id="thread-view" class="thread-view hidden" aria-live="polite">
          <div id="messages" class="messages"></div>
          <div id="live-activity" class="live-activity hidden" role="status">
            <span class="live-activity-indicator" aria-hidden="true"></span>
            <div>
              <strong id="live-activity-title"></strong>
              <p id="live-activity-detail"></p>
            </div>
          </div>
          <details id="automation-events" class="automation-events hidden">
            <summary>自动化事件 <span id="automation-event-count" class="automation-event-count"></span></summary>
            <div id="automation-event-list" class="automation-event-list"></div>
          </details>
          <div id="approval-notice" class="approval-notice hidden"></div>
        </section>

        <form id="composer" class="composer hidden">
          <textarea id="message-input" rows="3" maxlength="30000" placeholder="给 Codex 发送指令…"></textarea>
          <div class="composer-bottom">
            <span id="turn-status" class="turn-status">准备就绪</span>
            <div class="composer-actions">
              <button id="interrupt-turn" class="quiet-button" type="button" disabled>停止</button>
              <button class="primary-button" type="submit">发送 <span>↵</span></button>
            </div>
          </div>
        </form>

        <section id="settings-view" class="settings-view hidden" aria-labelledby="settings-title">
          <header class="settings-header">
            <div>
              <p class="eyebrow">设置</p>
              <h1 id="settings-title">设置</h1>
            </div>
            <button id="close-settings" class="quiet-button" type="button">返回控制台</button>
          </header>
          <section class="settings-section" aria-labelledby="preference-setting-title">
            <div class="settings-section-heading">
              <h2 id="preference-setting-title">偏好设置</h2>
            </div>
            <div class="preference-options">
              <label class="preference-option" for="show-cc-switch">
                <span class="preference-option-copy">
                  <strong>在主页显示 CC Switch 按钮</strong>
                  <span>关闭后只隐藏左侧栏入口，不影响服务商检测与当前配置。</span>
                </span>
                <span class="preference-switch">
                  <input id="show-cc-switch" type="checkbox" />
                  <span class="preference-switch-track" aria-hidden="true"></span>
                </span>
              </label>
              <label class="preference-option" for="show-message-times">
                <span class="preference-option-copy">
                  <strong>显示对话气泡时间</strong>
                  <span>开启后在你和 Codex 的消息气泡底部显示本机时间。</span>
                </span>
                <span class="preference-switch">
                  <input id="show-message-times" type="checkbox" />
                  <span class="preference-switch-track" aria-hidden="true"></span>
                </span>
              </label>
            </div>
          </section>
          <section class="settings-section" aria-labelledby="theme-setting-title">
            <div class="settings-section-heading">
              <h2 id="theme-setting-title">主题</h2>
            </div>
            <div class="theme-options" role="radiogroup" aria-label="主题">
              <label class="theme-option" data-theme-option="default">
                <input type="radio" name="theme" value="default" />
                <span class="theme-preview theme-preview-default" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>默认主题</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="liquid-glass">
                <input type="radio" name="theme" value="liquid-glass" />
                <span class="theme-preview theme-preview-liquid" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>液态玻璃</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="swiss-modernism">
                <input type="radio" name="theme" value="swiss-modernism" />
                <span class="theme-preview theme-preview-swiss" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>瑞士现代主义</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="glassmorphism">
                <input type="radio" name="theme" value="glassmorphism" />
                <span class="theme-preview theme-preview-glass" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>毛玻璃</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="real-time-monitoring">
                <input type="radio" name="theme" value="real-time-monitoring" />
                <span class="theme-preview theme-preview-monitoring" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>实时监控</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="data-dense-dashboard">
                <input type="radio" name="theme" value="data-dense-dashboard" />
                <span class="theme-preview theme-preview-dense" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>数据密集仪表板</strong>
                </span>
              </label>
              <label class="theme-option" data-theme-option="accessible-ethical">
                <input type="radio" name="theme" value="accessible-ethical" />
                <span class="theme-preview theme-preview-accessible" aria-hidden="true"><span></span><span></span></span>
                <span class="theme-option-copy">
                  <strong>高可访问性</strong>
                </span>
              </label>
            </div>
          </section>
        </section>
      </section>
    </main>

    <dialog id="new-thread-dialog" class="new-thread-dialog">
      <form id="new-thread-form" method="dialog">
        <div class="dialog-heading">
          <div>
            <p class="eyebrow">创建线程</p>
            <h2>选择工作目录</h2>
          </div>
          <button id="close-dialog" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <label>
          工作目录（绝对路径）
          <input id="cwd-input" name="cwd" required placeholder="/Users/you/Code/Project/example" />
        </label>
        <label>
          模型
          <select id="model-input" name="model" aria-label="新线程模型"></select>
        </label>
        <label>
          推理强度
          <select id="effort-input" name="effort" aria-label="新线程推理强度"></select>
        </label>
        <p class="dialog-note">新线程默认使用 <code>on-request</code> 审批策略。网页不会读取或保存 API 凭据。</p>
        <div class="dialog-actions">
          <button id="cancel-dialog" class="quiet-button" type="button">取消</button>
          <button class="primary-button" type="submit">创建线程</button>
        </div>
      </form>
    </dialog>

    <dialog id="provider-dialog" class="provider-dialog">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">CC Switch</p>
          <h2>切换全局服务商</h2>
        </div>
        <button id="close-provider-dialog" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>
      <p id="provider-dialog-note" class="dialog-note">切换会影响这台 Mac 上后续的所有 Codex 请求。</p>
      <div id="provider-portable" class="provider-portable hidden">
        <div>
          <strong>未检测到兼容的切换组件</strong>
          <span id="provider-portable-detail"></span>
        </div>
        <button id="install-provider-portable" class="quiet-button" type="button">安装便携组件</button>
      </div>
      <div id="provider-list" class="provider-list" role="list"></div>
    </dialog>

    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
